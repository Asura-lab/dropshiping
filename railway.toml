[build]
builder = "NIXPACKS"
buildCommand = "npm install && npx prisma generate --schema=prisma/schema.prisma && npm run build --workspace=apps/api"

[deploy]
startCommand = "npx prisma migrate deploy --schema=prisma/schema.prisma && node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
