[build]
builder = "NIXPACKS"
buildCommand = "npm install && DATABASE_URL=postgresql://x:x@localhost:5432/x npx prisma generate --schema=prisma/schema.prisma && npm run build --workspace=apps/api"

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
